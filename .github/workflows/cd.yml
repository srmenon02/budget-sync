name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download frontend artifact from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: frontend-dist
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact
        run: |
          test -d dist
          test -n "$(ls -A dist)"

      - name: Build and push Docker image to GHCR
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/budget-sync-api
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" -t "${IMAGE_NAME}:latest" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"

      - name: Install Trivy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker image with Trivy
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/budget-sync-api
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: trivy image --severity CRITICAL,HIGH --exit-code 1 "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets['FLY_API_TOKEN'] }}
          FLY_APP_NAME: ${{ secrets['FLY_APP_NAME'] }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/budget-sync-api
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_APP_NAME}" ]; then
            echo "FLY_APP_NAME secret is required"
            exit 1
          fi
          "${HOME}/.fly/bin/flyctl" deploy \
            --app "${FLY_APP_NAME}" \
            --config fly.toml \
            --image "${IMAGE_NAME}:${IMAGE_TAG}" \
            --remote-only

      - name: Deployment summary
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/budget-sync-api
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## CD Summary"
            echo "- Source branch: ${{ github.event.workflow_run.head_branch }}"
            echo "- Source SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "- Pulled artifact: frontend-dist"
            echo "- Pushed images: ${IMAGE_NAME}:${IMAGE_TAG}, ${IMAGE_NAME}:latest"
            echo "- Trivy scan: passed"
            echo "- Fly deploy: passed"
          } >> "$GITHUB_STEP_SUMMARY"
