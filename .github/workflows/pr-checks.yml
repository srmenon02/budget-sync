name: PR Checks

on:
  pull_request:

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run npm audit
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: budgetsync-api/requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r budgetsync-api/requirements.txt

  verify-ci-passed:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs:
      - secret-scan
      - dependency-audit
    steps:
      - name: Assert CI workflow status is successful
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          response="$(curl -sSfL \
            -H \"Accept: application/vnd.github+json\" \
            -H \"Authorization: Bearer ${GH_TOKEN}\" \
            \"https://api.github.com/repos/${REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${PR_HEAD_SHA}&event=pull_request&per_page=1\")"

          ci_conclusion="$(echo \"${response}\" | python3 -c 'import json,sys; data=json.load(sys.stdin); runs=data.get("workflow_runs", []); print(runs[0].get("conclusion", "missing") if runs else "missing")')"

          if [ "${ci_conclusion}" != "success" ]; then
            echo "CI workflow conclusion for PR head ${PR_HEAD_SHA}: ${ci_conclusion}"
            exit 1
          fi
