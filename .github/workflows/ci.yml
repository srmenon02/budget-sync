name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error

  backend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: budgetsync-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: budgetsync-api/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install backend quality tooling
        run: pip install flake8 pip-audit

      - name: Lint backend
        run: flake8 app tests

      - name: Run backend tests with coverage
        run: pytest tests --cov=app --cov-report=xml --cov-report=term -q

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: error

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
